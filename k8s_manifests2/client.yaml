apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: app-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: qulive/client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: API_URL
              value: "http://stream-server:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: app-namespace
spec:
  selector:
    app: client
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      name: http