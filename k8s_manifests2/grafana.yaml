apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-env
  namespace: app-namespace
data:
  GF_SECURITY_ADMIN_USER: user
  GF_SECURITY_ADMIN_PASSWORD: password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: app-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          envFrom:
            - configMapRef:
                name: grafana-env
      volumes:
        - name: grafana-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: app-namespace
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30001