# Nginx Exporter
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-exporter
  namespace: app-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-exporter
  template:
    metadata:
      labels:
        app: nginx-exporter
    spec:
      containers:
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9113
          args:
            - --nginx.scrape-uri=http://nginx:8082/stub_status
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-exporter
  namespace: app-namespace
spec:
  selector:
    app: nginx-exporter
  ports:
    - protocol: TCP
      port: 9113
      targetPort: 9113

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: app-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: app-namespace
spec:
  selector:
    app: redis-exporter
  ports:
    - protocol: TCP
      port: 9121
      targetPort: 9121