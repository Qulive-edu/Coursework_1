apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: app-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: qulive/client:latest
          ports:
            - containerPort: 3000
          env:
            - name: API_URL
              value: "http://stream-server:8080"
