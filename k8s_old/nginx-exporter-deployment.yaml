apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-exporter
  namespace: app-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-exporter
  template:
    metadata:
      labels:
        app: nginx-exporter
    spec:
      containers:
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.0
          ports:
            - containerPort: 9113
          args:
            - --nginx.scrape-uri=http://nginx/stub_status