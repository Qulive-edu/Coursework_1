version: '3.9'
services:
  stream-server:
    container_name: stream-server
    build:
      context: ./stream-server
    ports:
      - "8080:8080"
    volumes:
      - ./videos:/app/videos
    environment:
      - VIDEO_DIRECTORY=/app/videos
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
      - prometheus
    networks:
      - localhost

  nginx:
    container_name: nginx
    restart: always
    build:
      context: ./nginx
    ports:
      - "80:80"
      - "127.0.0.1:8082:8082"
    depends_on:
      - stream-server
      - prometheus
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - localhost

  nginx-prometheus-exporter:
    image: nginx/nginx-prometheus-exporter:1.0
    container_name: prometheus-nginx-exporter
    restart: always
    env_file:
      .env
    command:
      - --nginx.scrape-uri=http://nginx/stub_status
    expose: 
      - 9113
    networks:
      - localhost
    depends_on:
      - prometheus

  redis:
    container_name: redis
    image: redis:alpine
    ports:
      - "6379:6379"
    depends_on:
      - prometheus
    networks:
      - localhost

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - localhost

  client:
    container_name: client
    build:
      context: ./client
    ports:
      - "3000:3000"
    depends_on:
      - nginx
      - prometheus
    networks:
      - localhost

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - localhost
    user: root

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/data:/var/lib/grafana
    env_file:
      - .env
    user: root
    depends_on:
      - prometheus
    networks:
      - localhost

volumes:
  grafana-data:

networks:
    localhost:
        name: localhost
        external: false